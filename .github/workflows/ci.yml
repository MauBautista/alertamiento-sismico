name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela runs superseded del mismo ref (ahorra minutos de CI).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api:
    name: api · ruff + pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      db:
        # Misma imagen que docker-compose y el EC2 dev (TimescaleDB + PostGIS);
        # la suite exige DB viva (el conftest aplica `alembic upgrade head`).
        image: timescale/timescaledb-ha:pg16
        env:
          POSTGRES_USER: takab
          POSTGRES_PASSWORD: takab_dev
          POSTGRES_DB: takab
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U takab -d takab"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
    env:
      DATABASE_URL: postgresql+psycopg://takab:takab_dev@127.0.0.1:5433/takab
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        run: python -m pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Formato (ruff)
        run: ruff format --check .
      - name: Tests (pytest)
        run: pytest -q -m "not perf"
      - name: Drift gate · OpenAPI (sdk-ts)
        # El contrato volcado debe coincidir con el commiteado. Si cambia la API
        # sin regenerar shared/sdk-ts/openapi.json, esto falla.
        run: |
          python scripts/export_openapi.py
          git -C .. diff --exit-code shared/sdk-ts/openapi.json

  sdk:
    name: sdk-ts · generate + tsc
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shared/sdk-ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: shared/sdk-ts/package-lock.json
      - name: Instalar dependencias
        run: npm ci
      - name: Generar cliente (openapi-ts)
        run: npm run generate
      - name: Drift gate · src/gen
        # El cliente generado debe coincidir con el commiteado (contrato → tipos).
        run: git -C ../.. diff --exit-code shared/sdk-ts/src/gen
      - name: Typecheck (tsc)
        run: npm run check

  web:
    name: web · eslint + prettier + vitest + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            shared/sdk-ts/package-lock.json
      # @takab/sdk entra como symlink file: → sus deps de runtime
      # (@hey-api/client-fetch) resuelven por realpath contra
      # shared/sdk-ts/node_modules, que debe estar poblado.
      - name: Instalar dependencias (sdk)
        run: npm ci
        working-directory: shared/sdk-ts
      - name: Instalar dependencias
        run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Formato (prettier)
        run: npm run format:check
      - name: Tests (vitest)
        run: npm run test -- --run
      - name: Build (tsc + vite)
        run: npm run build

  edge:
    name: edge · ruff + pytest (sin hardware)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge
    env:
      # Sin GPIO físico en CI: gpiozero usa la MockFactory (blueprint §4.4).
      GPIOZERO_PIN_FACTORY: mock
    steps:
      - uses: actions/checkout@v4
      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: edge/uv.lock
      - name: Sincronizar entorno (Python 3.12 + deps + grupo dev)
        run: uv sync
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Formato (ruff)
        run: uv run ruff format --check .
      - name: Tests (pytest)
        run: uv run pytest -q

  infra:
    name: infra · terraform fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.7"
      - name: Formato (terraform fmt)
        run: terraform fmt -check -recursive infra/terraform
      - name: Validate bootstrap
        run: terraform -chdir=infra/terraform/bootstrap init -backend=false && terraform -chdir=infra/terraform/bootstrap validate
      - name: Validate envs/dev
        run: terraform -chdir=infra/terraform/envs/dev init -backend=false && terraform -chdir=infra/terraform/envs/dev validate
      # TODO: paso opcional de plan-only con el rol OIDC takab-ci-plan (requiere
      # permissions: id-token: write). Se deja fuera para mantener el CI de PRs
      # hermético; ver infra/terraform/README.md.
