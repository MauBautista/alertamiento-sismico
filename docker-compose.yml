services:
  db:
    image: timescale/timescaledb-ha:pg16
    container_name: takab-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-takab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-takab_dev}
      POSTGRES_DB: ${POSTGRES_DB:-takab}
    ports:
      # 5433: el 5432 del host suele estar ocupado por el Postgres del sistema
      # y es el default de la app (api/src/takab_api/settings.py).
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - takab_pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-takab}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  takab_pgdata:
