services:
  db:
    image: timescale/timescaledb-ha:pg16
    container_name: takab-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-takab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-takab_dev}
      POSTGRES_DB: ${POSTGRES_DB:-takab}
    ports:
      # 5433: el 5432 del host suele estar ocupado por el Postgres del sistema
      # y es el default de la app (api/src/takab_api/settings.py).
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - takab_pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-takab}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # S3 local para el bucket de EVIDENCIA (dictámenes PDF, miniSEED). Sin esto,
  # `POST /incidents/{id}/report` solo podía escribir en S3 real y en desarrollo
  # devolvía 503 "bucket de evidencia no configurado": era imposible ver un
  # reporte generado sin credenciales de AWS. La API habla con él por el seam
  # `TAKAB_API_S3_ENDPOINT_URL` (api/src/takab_api/routers/_s3.py); producción
  # deja ese valor vacío y sigue yendo a AWS.
  minio:
    image: minio/minio:latest
    container_name: takab-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-takab}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-takab_dev_secret}
    ports:
      # 9000 = API S3 (la consola abre aquí el presigned URL del PDF).
      # 9001 = consola web de MinIO, para inspeccionar la evidencia a mano.
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - takab_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Crea el bucket una vez y termina (el bucket debe existir ANTES del put).
  minio-init:
    image: minio/mc:latest
    container_name: takab-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-takab}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-takab_dev_secret}
      EVIDENCE_BUCKET: ${TAKAB_API_EVIDENCE_BUCKET:-takab-dev-evidence}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\" &&
      mc mb --ignore-existing local/\"$$EVIDENCE_BUCKET\" &&
      echo \"bucket de evidencia listo: $$EVIDENCE_BUCKET\"
      "

volumes:
  takab_pgdata:
  takab_minio:
